<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tori-Kauppa: Strateginen Laskuri v11</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
        :root { --tori-orange: #ff5a00; --tori-blue: #005eff; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #1e293b; }
        header { background: #fff; padding: 10px 40px; text-align: center; border-bottom: 4px solid var(--tori-orange); display: flex; justify-content: space-between; align-items: center; }
        .tabs { display: flex; justify-content: center; gap: 5px; margin: 20px 0; }
        .tab-btn { padding: 10px 25px; border: none; background: #e2e8f0; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: var(--tori-blue); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: grid; grid-template-columns: 380px 1fr; gap: 30px; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { font-size: 1.1rem; border-bottom: 2px solid #f1f5f9; padding-bottom: 12px; margin-bottom: 15px; color: var(--tori-blue); }
        .btn-load { background: var(--tori-orange); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; margin-top: 5px; box-sizing: border-box; }
        .stat-card { border: 2px solid #f1f5f9; padding: 20px; border-radius: 16px; text-align: center; background: #fff; }
        .val { font-size: 32px; font-weight: 800; color: var(--tori-orange); }
        .roi-tag { background: #10b981; color: white; padding: 3px 10px; border-radius: 12px; font-size: 13px; font-weight: bold; }
        #chartROI, #chartCPC { width: 100%; height: 380px; }
        .date-selectors { display: none; margin-bottom: 15px; background: #f0f7ff; padding: 15px; border-radius: 12px; border: 1px solid #d1e5ff; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 24px; color: var(--tori-blue);">tori</div>
    <h1 style="font-size: 1.5rem; margin:0;">Strateginen Laskuri</h1>
    <div>
        <button class="btn-load" onclick="document.getElementById('fileInput').click()">Lataa asiakkaan data</button>
        <input type="file" id="fileInput" style="display:none" accept=".xlsx, .xls, .csv">
    </div>
</header>

<div class="tabs">
    <button class="tab-btn active" onclick="openTab(event, 'roi-tab')">Arvolaskuri</button>
    <button class="tab-btn" onclick="openTab(event, 'cpc-tab')">CPC-vertailu</button>
</div>

<div id="roi-tab" class="tab-content active">
    <div class="container">
        <aside class="card">
            <h2>Datan syöttö</h2>
            
            <div id="dateSelectorContainer" class="date-selectors">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div>
                        <label style="color: var(--tori-blue);">Vuosi:</label>
                        <select id="yearSelect" onchange="updateMonthOptions()"></select>
                    </div>
                    <div>
                        <label style="color: var(--tori-blue);">Kuukausi:</label>
                        <select id="monthSelect" onchange="applyFilteredData()"></select>
                    </div>
                </div>
            </div>

            <div class="input-group"><label>Ilmoitusmäärä (N Ads)</label><input type="number" id="totalAds" value="248" oninput="calculate()"></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Nykyinen paketti</label><select id="pkgA" onchange="syncPrice('A')"></select></div>
                <div><label>Liidit yhteensä</label><input type="number" id="leadsA" value="461" oninput="calculate()"></div>
            </div>
            <div class="input-group"><label>Nykyinen hinta (€)</label><select id="priceA" onchange="calculate()"></select></div>
            
            <hr style="border:0; border-top:2px solid #f1f5f9; margin:20px 0;">
            
            <label>Suositeltu paketti</label><select id="pkgB" onchange="syncPrice('B')"></select>
            <div class="input-group"><label>Uusi hinta (€)</label><select id="priceB" onchange="calculate()"></select></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                <div><label>Klousaus %</label><input type="number" id="closing" value="2.0" step="0.5" oninput="calculate()"></div>
                <div><label>Keskihinta (€)</label><input type="number" id="avgPrice" value="1000" oninput="calculate()"></div>
            </div>
        </aside>
        <main>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:20px;">
                <div class="stat-card"><h3>Nykyinen tuotto</h3><div class="val" id="uiRevA">0 €</div><div class="roi-tag" id="uiRoiA">ROI: 0%</div></div>
                <div class="stat-card"><h3>Ehdotettu tuotto</h3><div class="val" id="uiRevB">0 €</div><div class="roi-tag" id="uiRoiB">ROI: 0%</div></div>
            </div>
            <div class="card"><div id="chartROI"></div></div>
        </main>
    </div>
</div>

<div id="cpc-tab" class="tab-content">
    <div class="container">
        <aside class="card">
            <h2>CPC-analyysi</h2>
            <div class="input-group"><label>Katselukerrat / kk (N Ad Views)</label><input type="number" id="cpcClicks" value="112000" oninput="calculateCPC()"></div>
            <div class="input-group"><label>Valitse paketti</label><select id="cpcPkg" onchange="calculateCPC()"></select></div>
            <div class="input-group"><label>Paketin hinta (€)</label><select id="cpcPrice" onchange="calculateCPC()"></select></div>
            <hr style="border:0; border-top:2px solid #f1f5f9; margin:20px 0;">
            <div class="input-group"><label>Vertailun CPC (Google/Meta) €</label><input type="number" id="compCPC" value="0.50" step="0.05" oninput="calculateCPC()"></div>
        </aside>
        <main>
            <div class="stat-card">
                <h3>Tori-Kaupan CPC</h3>
                <div class="val" id="uiToriCPC">0,000 €</div>
                <p id="cpcEfficiency" style="font-weight: 600; color: #10b981; margin: 0;"></p>
            </div>
            <div class="card" style="margin-top:20px;"><div id="chartCPC"></div></div>
        </main>
    </div>
</div>

<script>
const PACKAGES = [
    { name: "Starter", price: 99, stars: 5 }, { name: "Standard", price: 129, stars: 10 },
    { name: "Advanced", price: 179, stars: 20 }, { name: "Plus", price: 279, stars: 50 },
    { name: "Premium", price: 489, stars: 100 }, { name: "Standard Feed", price: 599, stars: 150 }
];
const PRICE_POINTS = [99, 129, 179, 279, 299, 489, 599];
let uploadedData = [];

function init() {
    ['pkgA', 'pkgB', 'cpcPkg'].forEach(id => {
        PACKAGES.forEach((p, i) => document.getElementById(id).innerHTML += `<option value="${i}">${p.name} (${p.stars}*)</option>`);
    });
    ['priceA', 'priceB', 'cpcPrice'].forEach(id => {
        PRICE_POINTS.forEach(v => document.getElementById(id).innerHTML += `<option value="${v}">${v} €</option>`);
    });
    document.getElementById('pkgA').selectedIndex = 3; document.getElementById('pkgB').selectedIndex = 4;
    document.getElementById('cpcPkg').selectedIndex = 3; syncPrice('A'); syncPrice('B');
}

document.getElementById('fileInput').addEventListener('change', function(e) {
    const reader = new FileReader();
    reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type: 'array'});
        uploadedData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
        
        // Hae uniikit vuodet
        const years = [...new Set(uploadedData.map(row => row["Year of Event Date"]))].filter(Boolean).sort((a,b) => b-a);
        const ySelect = document.getElementById('yearSelect');
        ySelect.innerHTML = "";
        years.forEach(y => ySelect.innerHTML += `<option value="${y}">${y}</option>`);
        
        document.getElementById('dateSelectorContainer').style.display = "block";
        updateMonthOptions();
    };
    reader.readAsArrayBuffer(e.target.files[0]);
});

function updateMonthOptions() {
    const selectedYear = document.getElementById('yearSelect').value;
    // Suodata kuukaudet valitun vuoden perusteella
    const monthsForYear = [...new Set(uploadedData
        .filter(row => String(row["Year of Event Date"]) === selectedYear)
        .map(row => row["Month of Event Date"])
    )].filter(Boolean);

    const mSelect = document.getElementById('monthSelect');
    mSelect.innerHTML = "";
    monthsForYear.forEach(m => mSelect.innerHTML += `<option value="${m}">${m}</option>`);
    
    applyFilteredData();
}

function applyFilteredData() {
    const targetYear = document.getElementById('yearSelect').value;
    const targetMonth = document.getElementById('monthSelect').value;
    
    const row = uploadedData.find(r => 
        String(r["Year of Event Date"]) === targetYear && 
        r["Month of Event Date"] === targetMonth
    );
    
    if(row) {
        document.getElementById('totalAds').value = row["N Ads"] || 0;
        document.getElementById('cpcClicks').value = row["N Ad Views"] || 0;
        
        const convStart = parseFloat(row["N Conversation Start"]) || 0;
        const linkClicks = parseFloat(row["N Homepage Link Clicked"]) || 0;
        const phoneLeads = parseFloat(row["N Phone Leads"]) || 0;
        document.getElementById('leadsA').value = convStart + linkClicks + phoneLeads;
        
        calculate();
        calculateCPC();
    }
}

function openTab(evt, tabName) {
    document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.getElementById(tabName).classList.add("active");
    evt.currentTarget.classList.add("active");
}

function syncPrice(type) {
    const idx = document.getElementById('pkg'+type).selectedIndex;
    document.getElementById('price'+type).value = PACKAGES[idx].price;
    if(type === 'A') document.getElementById('cpcPkg').selectedIndex = idx;
    calculate();
}

function calculate() {
    const n = parseFloat(document.getElementById('totalAds').value) || 1;
    const leads = parseFloat(document.getElementById('leadsA').value) || 0;
    const closing = (parseFloat(document.getElementById('closing').value) || 0) / 100;
    const avg = parseFloat(document.getElementById('avgPrice').value) || 0;
    const costA = parseFloat(document.getElementById('priceA').value);
    const costB = parseFloat(document.getElementById('priceB').value);
    
    const M = 3.7;
    const sA = Math.min(PACKAGES[document.getElementById('pkgA').selectedIndex].stars, n);
    const v = leads / (n + (M * sA));

    const getR = (p, c) => {
        const r = v * (n + (M * Math.min(p.stars, n))) * closing * avg;
        return { rev: r, roi: c > 0 ? ((r-c)/c)*100 : 0 };
    };
    
    const rA = getR(PACKAGES[document.getElementById('pkgA').selectedIndex], costA);
    const rB = getRes = getR(PACKAGES[document.getElementById('pkgB').selectedIndex], costB);

    document.getElementById('uiRevA').textContent = Math.round(rA.rev).toLocaleString() + ' €';
    document.getElementById('uiRoiA').textContent = 'ROI: ' + Math.round(rA.roi).toLocaleString() + '%';
    document.getElementById('uiRevB').textContent = Math.round(rB.rev).toLocaleString() + ' €';
    document.getElementById('uiRoiB').textContent = 'ROI: ' + Math.round(rB.roi).toLocaleString() + '%';

    Plotly.newPlot('chartROI', [
        { x: ['Nykyinen', 'Ehdotus'], y: [costA, costB], name: 'Kulu', type: 'bar', marker: {color: '#005eff'}, text: [costA+'€', costB+'€'], textposition: 'auto' },
        { x: ['Nykyinen', 'Ehdotus'], y: [rA.rev, rB.rev], name: 'Tuotto', type: 'bar', marker: {color: '#ff5a00'}, text: [Math.round(rA.rev).toLocaleString()+'€', Math.round(rB.rev).toLocaleString()+'€'], textposition: 'auto' }
    ], { barmode: 'group', title: 'Tuottopotentiaali vs. Kulu' }, {displayModeBar: false});
}

function calculateCPC() {
    const clicks = parseFloat(document.getElementById('cpcClicks').value) || 1;
    const price = parseFloat(document.getElementById('cpcPrice').value) || 0;
    const comp = parseFloat(document.getElementById('compCPC').value) || 0;
    const tori = price / clicks;
    
    document.getElementById('uiToriCPC').textContent = tori.toFixed(3) + ' €';
    if(tori > 0 && comp > 0) document.getElementById('cpcEfficiency').textContent = `Tori on ${Math.round(comp/tori)}x edullisempi.`;

    Plotly.newPlot('chartCPC', [
        { x: ['Tori CPC', 'Muu CPC'], y: [tori, comp], type: 'bar', marker: {color: ['#ff5a00', '#005eff']}, text: [tori.toFixed(3)+'€', comp+'€'], textposition: 'auto' }
    ], { title: 'CPC-vertailu (€)', yaxis: {tickformat: '.3f'} }, {displayModeBar: false});
}

window.onload = init;
</script>
</body>
</html>
