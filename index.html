<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tori-Kauppa: Strateginen Laskuri v9</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
        :root { --tori-orange: #ff5a00; --tori-blue: #005eff; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #1e293b; }
        header { background: #fff; padding: 20px; text-align: center; border-bottom: 4px solid var(--tori-orange); display: flex; justify-content: space-between; align-items: center; padding: 10px 40px; }
        .tabs { display: flex; justify-content: center; gap: 5px; margin: 20px 0; }
        .tab-btn { padding: 10px 25px; border: none; background: #e2e8f0; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: var(--tori-blue); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: grid; grid-template-columns: 380px 1fr; gap: 30px; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-load { background: var(--tori-orange); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-load:hover { opacity: 0.9; }
        input, select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; margin-top: 5px; }
        .stat-card { border: 2px solid #f1f5f9; padding: 20px; border-radius: 16px; text-align: center; background: #fff; }
        .val { font-size: 32px; font-weight: 800; color: var(--tori-orange); }
        #chartROI, #chartCPC { width: 100%; height: 380px; }
        .hidden-input { display: none; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 20px; color: var(--tori-blue);">tori</div>
    <h1>Myyntityökalu</h1>
    <div>
        <button class="btn-load" onclick="document.getElementById('fileInput').click()">Lataa asiakkaan data</button>
        <input type="file" id="fileInput" class="hidden-input" accept=".xlsx, .xls, .csv">
    </div>
</header>

<div class="tabs">
    <button class="tab-btn active" onclick="openTab(event, 'roi-tab')">Arvolaskuri</button>
    <button class="tab-btn" onclick="openTab(event, 'cpc-tab')">CPC-vertailu</button>
</div>

<div id="roi-tab" class="tab-content active">
    <div class="container">
        <aside class="card">
            <h2 style="color: var(--tori-blue);">Datan syöttö</h2>
            <div id="dataStatus" style="font-size: 12px; margin-bottom: 10px; color: #059669;"></div>
            <div class="input-group"><label>Ilmoitusmäärä (kpl)</label><input type="number" id="totalAds" value="248" oninput="calculate()"></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Paketti</label><select id="pkgA" onchange="syncPrice('A')"></select></div>
                <div><label>Liidit/kk</label><input type="number" id="leadsA" value="461" oninput="calculate()"></div>
            </div>
            <hr style="border:0; border-top:2px solid #f1f5f9; margin:20px 0;">
            <label>Suositeltu paketti</label><select id="pkgB" onchange="syncPrice('B')"></select>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                <div><label>Klousaus %</label><input type="number" id="closing" value="2.0" step="0.5" oninput="calculate()"></div>
                <div><label>Keskihinta (€)</label><input type="number" id="avgPrice" value="1000" oninput="calculate()"></div>
            </div>
        </aside>
        <main>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:20px;">
                <div class="stat-card"><h3>Nykyinen</h3><div class="val" id="uiRevA">0 €</div></div>
                <div class="stat-card"><h3>Ehdotus</h3><div class="val" id="uiRevB">0 €</div></div>
            </div>
            <div class="card"><div id="chartROI"></div></div>
        </main>
    </div>
</div>

<div id="cpc-tab" class="tab-content">
    <div class="container">
        <aside class="card">
            <h2 style="color: var(--tori-blue);">CPC-analyysi</h2>
            <label>Katselukerrat / kk</label><input type="number" id="cpcClicks" value="112000" oninput="calculateCPC()">
            <label style="margin-top:10px;">Vertailun CPC (€)</label><input type="number" id="compCPC" value="0.50" step="0.05" oninput="calculateCPC()">
        </aside>
        <main>
            <div class="stat-card"><div class="val" id="uiToriCPC">0,000 €</div><p id="cpcEfficiency"></p></div>
            <div class="card" style="margin-top:20px;"><div id="chartCPC"></div></div>
        </main>
    </div>
</div>

<script>
const PACKAGES = [
    { name: "Starter", price: 99, stars: 5 }, { name: "Standard", price: 129, stars: 10 },
    { name: "Advanced", price: 179, stars: 20 }, { name: "Plus", price: 279, stars: 50 },
    { name: "Premium", price: 489, stars: 100 }, { name: "Standard Feed", price: 599, stars: 150 }
];

function init() {
    ['pkgA', 'pkgB'].forEach(id => {
        PACKAGES.forEach((p, i) => document.getElementById(id).innerHTML += `<option value="${i}">${p.name}</option>`);
    });
    document.getElementById('pkgA').selectedIndex = 3; document.getElementById('pkgB').selectedIndex = 4;
    calculate();
}

// TIEDOSTON LUKEMINEN (Sama logiikka kuin kuluanalysaattorissa)
document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type: 'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet);
        
        // Etsitään arvot sarakkeista (esim. Tableau exportin tyypilliset nimet)
        if(json.length > 0) {
            const row = json[0]; 
            // Nämä avaimet kannattaa tarkistaa Tableau-exportista
            document.getElementById('totalAds').value = row["Ilmoituksia"] || row["Ads"] || 248;
            document.getElementById('leadsA').value = row["Liidejä"] || row["Leads"] || 461;
            document.getElementById('cpcClicks').value = row["Katselukerrat"] || row["Views"] || 112000;
            
            document.getElementById('dataStatus').textContent = "✓ Data ladattu tiedostosta: " + file.name;
            calculate();
            calculateCPC();
        }
    };
    reader.readAsArrayBuffer(file);
});

function openTab(evt, tabName) {
    document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.getElementById(tabName).classList.add("active");
    evt.currentTarget.classList.add("active");
    if(tabName === 'roi-tab') calculate(); else calculateCPC();
}

function calculate() {
    const n = parseFloat(document.getElementById('totalAds').value) || 1;
    const leads = parseFloat(document.getElementById('leadsA').value) || 0;
    const closing = (parseFloat(document.getElementById('closing').value) || 0) / 100;
    const avg = parseFloat(document.getElementById('avgPrice').value) || 0;
    const costA = PACKAGES[document.getElementById('pkgA').selectedIndex].price;
    const costB = PACKAGES[document.getElementById('pkgB').selectedIndex].price;
    
    const v = leads / (n + (3.7 * Math.min(PACKAGES[document.getElementById('pkgA').selectedIndex].stars, n)));
    const getR = (p, c) => {
        const r = v * (n + (3.7 * Math.min(p.stars, n))) * closing * avg;
        return { rev: r, roi: ((r-c)/c)*100 };
    };
    const rA = getR(PACKAGES[document.getElementById('pkgA').selectedIndex], costA);
    const rB = getR(PACKAGES[document.getElementById('pkgB').selectedIndex], costB);

    document.getElementById('uiRevA').textContent = Math.round(rA.rev).toLocaleString() + ' €';
    document.getElementById('uiRevB').textContent = Math.round(rB.rev).toLocaleString() + ' €';

    Plotly.newPlot('chartROI', [
        { x: ['Nykyinen', 'Ehdotus'], y: [costA, costB], name: 'Kulu', type: 'bar', marker: {color: '#005eff'}, text: [costA+'€', costB+'€'], textposition: 'auto' },
        { x: ['Nykyinen', 'Ehdotus'], y: [rA.rev, rB.rev], name: 'Tuotto', type: 'bar', marker: {color: '#ff5a00'}, text: [Math.round(rA.rev)+'€', Math.round(rB.rev)+'€'], textposition: 'auto' }
    ], { barmode: 'group', title: 'Tuotto vs. Kulu' }, {displayModeBar: false});
}

function calculateCPC() {
    const clicks = parseFloat(document.getElementById('cpcClicks').value) || 1;
    const cost = PACKAGES[document.getElementById('pkgA').selectedIndex].price;
    const comp = parseFloat(document.getElementById('compCPC').value) || 0;
    const tori = cost / clicks;
    document.getElementById('uiToriCPC').textContent = tori.toFixed(3) + ' €';
    if(tori > 0 && comp > 0) document.getElementById('cpcEfficiency').textContent = `Tori on ${Math.round(comp/tori)}x edullisempi.`;
    
    Plotly.newPlot('chartCPC', [
        { x: ['Tori CPC', 'Muu CPC'], y: [tori, comp], type: 'bar', marker: {color: ['#ff5a00', '#005eff']}, text: [tori.toFixed(3)+'€', comp+'€'], textposition: 'auto' }
    ], { title: 'CPC-vertailu' }, {displayModeBar: false});
}

window.onload = init;
</script>
</body>
</html>
